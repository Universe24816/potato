<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>うめだの紹介ページ</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #a8edea, #fed6e3);
      margin: 0;
      padding: 0;
      color: #333;
      text-align: center;
    }
    .container {
      max-width: 600px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 2em;
      margin-bottom: 10px;
    }
    p {
      line-height: 1.6;
    }
    .section {
      margin-top: 20px;
    }
    .emoji {
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌟 うめだの紹介 🌟</h1>
    <p>こんにちは！うめだです😊<br>明るく元気にいろんなことに挑戦中！</p>

    <div class="section">
      <h2>🎯 好きなこと</h2>
      <p>・新しいことにチャレンジ<br>・友達と楽しく過ごす</p>
    </div>

    <div class="section">
      <h2>💪 得意なこと</h2>
      <p>・コツコツ努力すること<br>・最後まであきらめないこと</p>
    </div>

    <div class="section">
      <h2>🌈 目標</h2>
      <p>自分の可能性を広げて、成長し続ける！</p>
    </div>

    <div class="section">
      <h2>✨ ひとこと</h2>
      <p>「前向きに全力で！」</p>
    </div>
  </div>
</body>
</html>
